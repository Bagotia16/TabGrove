<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabGrove</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="popup-app">
    <header id="popup-header">
      <img src="icons/icon48.png" alt="" id="popup-logo">
      <h1>TabGrove</h1>
    </header>

    <div id="popup-body">
      <div id="active-label">
        <span class="label">Active:</span>
        <span id="popup-active-category">—</span>
      </div>

      <label for="switch-select" class="label">Switch to</label>
      <select id="switch-select" aria-label="Switch category"></select>
      <button id="btn-switch" class="btn-primary">Switch</button>
    </div>

    <footer id="popup-footer">
      <button id="btn-open-panel" class="btn-secondary">Open Side Panel ↗</button>
    </footer>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
